<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Integração Definitiva - Etiqueta Field Control</title>
    <style>
        body { font-family: Arial, sans-serif; background-color: #f4f7f6; color: #333; padding: 20px; }
        .container { max-width: 650px; margin: 0 auto; background: #fff; padding: 20px; border-radius: 8px; box-shadow: 0 4px 6px rgba(0,0,0,0.1); }
        h1 { font-size: 20px; color: #8e44ad; border-bottom: 2px solid #8e44ad; padding-bottom: 10px; }
        label { display: block; margin-top: 10px; font-weight: bold; font-size: 13px; }
        input[type="text"], input[type="password"] { width: 100%; padding: 8px; margin-top: 5px; border: 1px solid #ccc; border-radius: 4px; box-sizing: border-box; }
        .grid-2 { display: grid; grid-template-columns: 1fr 1fr; gap: 15px; }
        button { margin-top: 20px; padding: 12px 15px; background-color: #8e44ad; color: #fff; border: none; border-radius: 4px; cursor: pointer; font-size: 16px; width: 100%; font-weight: bold; }
        button:hover { background-color: #732d91; }
        .log-area { margin-top: 20px; padding: 10px; background: #2c3e50; color: #ecf0f1; border-radius: 4px; font-family: monospace; white-space: pre-wrap; word-break: break-all; min-height: 200px; font-size: 12px; max-height: 400px; overflow-y: auto; }
        .section-title { margin-top: 20px; color: #7f8c8d; font-size: 12px; text-transform: uppercase; border-bottom: 1px solid #eee; padding-bottom: 5px; }
        .aviso-cors { font-size: 11px; color: #e74c3c; margin-top: 5px; font-style: italic; }
    </style>
</head>
<body>

<div class="container">
    <h1>Automação Completa (Login + Busca + Mutação)</h1>
    
    <div class="section-title">Credenciais de Acesso Automático</div>
    <div class="grid-2">
        <div>
            <label>E-mail (Login):</label>
            <input type="text" id="email" value="luiz.lackeski@cobli.co">
        </div>
        <div>
            <label>Senha:</label>
            <input type="password" id="senha" value="rvc9nzv!bta_nvp9DRH">
        </div>
    </div>
    <div class="aviso-cors">*Nota: Testes diretos no navegador podem exigir desativar o CORS (Allow CORS extension). Em backend (Node/PHP) funciona nativamente.</div>

    <div class="section-title">Configurações da API</div>
    
    <label>URL de Login (Auth):</label>
    <input type="text" id="apiUrlLogin" value="https://morannon.fieldcontrol.com.br">

    <label>URL Base da API (REST para Busca):</label>
    <input type="text" id="apiUrlRest" value="https://api.fieldcontrol.com.br">
    
    <label>Chave da API (X-Api-Key):</label>
    <input type="text" id="apiKeyRest" placeholder="Sua chave X-Api-Key (para a busca REST)">

    <label>URL da API (GraphQL para Inserir):</label>
    <input type="text" id="apiUrlGraph" value="https://sammathnaur.fieldcontrol.com.br/graphql">

    <div class="section-title">Ação</div>
    <label>Número do Chamado:</label>
    <input type="text" id="numeroChamado" placeholder="Ex: 46389903024">

    <button onclick="executarTesteTotal()">Executar Automação Completa</button>

    <label>Log do Sistema:</label>
    <div id="logArea" class="log-area">Aguardando...</div>
</div>

<script>
    // ID Fixo da sua Etiqueta
    const FIXED_LABEL_ID = "7e653f62-f380-4924-851a-fc754d8fd470";

    function log(message) {
        const logArea = document.getElementById('logArea');
        logArea.innerText += '\n' + message;
        logArea.scrollTop = logArea.scrollHeight; 
        console.log(message);
    }

    async function executarTesteTotal() {
        document.getElementById('logArea').innerText = "Iniciando Automação...";
        
        const email = document.getElementById('email').value.trim();
        const senha = document.getElementById('senha').value.trim();
        const urlLogin = document.getElementById('apiUrlLogin').value.trim();
        const urlRest = document.getElementById('apiUrlRest').value.trim();
        const apiKeyRest = document.getElementById('apiKeyRest').value.trim();
        const urlGraph = document.getElementById('apiUrlGraph').value.trim();
        const numeroChamado = document.getElementById('numeroChamado').value.trim();

        if (!email || !senha || !urlLogin || !urlRest || !apiKeyRest || !urlGraph || !numeroChamado) {
            log("❌ ERRO: Preencha todos os campos antes de rodar.");
            return;
        }

        let tokenDinamico = null;
        let maintenanceId = null;

        // =====================================================================
        // PASSO 0: FAZER LOGIN PARA PEGAR O TOKEN BEARER FRESCO
        // =====================================================================
        try {
            log(`\n[PASSO 0] Realizando login automático com ${email}...`);
            
            const loginRes = await fetch(`${urlLogin}/auth/sign-in`, {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({ email: email, password: senha })
            });
            
            if (!loginRes.ok) {
                log(`❌ ERRO NO LOGIN (Status ${loginRes.status}). Verifique e-mail, senha ou bloqueio de CORS.`);
                return;
            }

            const loginJson = await loginRes.json();
            
            // Extrai o token
            tokenDinamico = loginJson.token || loginJson.accessToken || (loginJson.data && loginJson.data.token);
            
            if (!tokenDinamico) {
                log(`❌ ERRO: Login aceito, mas Token não encontrado na resposta.`);
                return;
            }

            log(`✅ Login com sucesso! Novo Token temporário gerado.`);

        } catch (error) {
            log(`\n❌ ERRO FATAL NO PASSO 0 (Login): ${error.message}`);
            log("💡 Dica: Se for erro de 'fetch' ou 'CORS', é o navegador bloqueando. Use uma extensão de Allow CORS para testes web.");
            return;
        }

        // =====================================================================
        // PASSO 1: BUSCAR O ID DA MANUTENÇÃO VIA REST
        // =====================================================================
        try {
            log(`\n[PASSO 1] Buscando o chamado ${numeroChamado}...`);
            
            const hoje = new Date();
            const trintaDiasAtras = new Date();
            trintaDiasAtras.setDate(hoje.getDate() - 5); 

            const dataInicio = trintaDiasAtras.toISOString().split("T")[0] + "T00:00:00.000Z";
            const dataFim = hoje.toISOString();

            let page = 1;
            let encontrou = false;

            while (page <= 5 && !encontrou) {
                log(`Varrendo página ${page}...`);
                const buscaUrl = `${urlRest}/maintenances?page=${page}&perPage=100&openedAtGte=${dataInicio}&openedAtLte=${dataFim}`;
                
                const res = await fetch(buscaUrl, {
                    method: 'GET',
                    headers: { 'X-Api-Key': apiKeyRest, 'Accept': 'application/json' }
                });
                
                if (!res.ok) break;

                const json = await res.json();
                const items = json.items || [];
                
                if (items.length === 0) break;

                for (let item of items) {
                    const numeroDoItem = String(item.number || "").trim();
                    const identifierDoItem = String(item.identifier || "").trim();
                    
                    if (numeroDoItem.startsWith(numeroChamado) || identifierDoItem.startsWith(numeroChamado)) {
                        maintenanceId = item.id || item.uuid || item.idMaintenance || item.identifier;
                        encontrou = true;
                        break;
                    }
                }
                page++;
            }

            if (!maintenanceId) {
                log(`❌ ERRO: O chamado ${numeroChamado} não foi encontrado.`);
                return;
            }

            log(`✅ Chamado encontrado! ID Interno: ${maintenanceId}`);

        } catch (error) {
            log(`\n❌ ERRO NO PASSO 1 (Busca REST): ${error.message}`);
            return;
        }

        // =====================================================================
        // PASSO 2: INSERIR ETIQUETA VIA GRAPHQL (COM O TOKEN NOVO)
        // =====================================================================
        try {
            log(`\n[PASSO 2] Inserindo a etiqueta no GraphQL...`);

            const headersGraph = {
                'Content-Type': 'application/json',
                'Authorization': `Bearer ${tokenDinamico}`
            };

            const queryMutacao = `
                mutation createMaintenanceLabels($input: [MaintenanceLabelCreateInput]!) {
                    createMaintenanceLabels(input: $input) {
                        id
                        __typename
                    }
                }
            `;

            const responseMutacao = await fetch(urlGraph, {
                method: 'POST',
                headers: headersGraph,
                body: JSON.stringify({
                    query: queryMutacao,
                    variables: {
                        input: [ { labelId: FIXED_LABEL_ID, maintenanceId: maintenanceId } ]
                    }
                })
            });

            const dataMutacao = await responseMutacao.json();

            if (dataMutacao.errors) {
                log("❌ ERRO na Mutação GraphQL:");
                log(JSON.stringify(dataMutacao.errors, null, 2));
            } else {
                log("🎉 SUCESSO ABSOLUTO! A etiqueta foi vinculada ao chamado!");
                log(JSON.stringify(dataMutacao.data, null, 2));
            }

        } catch (error) {
            log(`\n❌ ERRO NO PASSO 2 (GraphQL): ${error.message}`);
        }
    }
</script>

</body>
</html>
