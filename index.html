<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Integração Definitiva - Etiqueta em Lote</title>
    <style>
        body { font-family: Arial, sans-serif; background-color: #f4f7f6; color: #333; padding: 20px; }
        .container { max-width: 650px; margin: 0 auto; background: #fff; padding: 20px; border-radius: 8px; box-shadow: 0 4px 6px rgba(0,0,0,0.1); }
        h1 { font-size: 20px; color: #8e44ad; border-bottom: 2px solid #8e44ad; padding-bottom: 10px; }
        label { display: block; margin-top: 10px; font-weight: bold; font-size: 13px; }
        input[type="text"], input[type="password"], textarea { width: 100%; padding: 8px; margin-top: 5px; border: 1px solid #ccc; border-radius: 4px; box-sizing: border-box; }
        textarea { font-family: monospace; resize: vertical; }
        .grid-2 { display: grid; grid-template-columns: 1fr 1fr; gap: 15px; }
        button { margin-top: 20px; padding: 12px 15px; background-color: #8e44ad; color: #fff; border: none; border-radius: 4px; cursor: pointer; font-size: 16px; width: 100%; font-weight: bold; }
        button:hover { background-color: #732d91; }
        .log-area { margin-top: 20px; padding: 10px; background: #2c3e50; color: #ecf0f1; border-radius: 4px; font-family: monospace; white-space: pre-wrap; word-break: break-all; min-height: 250px; font-size: 12px; max-height: 500px; overflow-y: auto; }
        .section-title { margin-top: 20px; color: #7f8c8d; font-size: 12px; text-transform: uppercase; border-bottom: 1px solid #eee; padding-bottom: 5px; }
        .aviso-cors { font-size: 11px; color: #e74c3c; margin-top: 5px; font-style: italic; }
    </style>
</head>
<body>

<div class="container">
    <h1>Automação em Lote (Vincular Tickets)</h1>
    
    <div class="section-title">Credenciais do Usuário (Fica salvo no seu PC)</div>
    <div class="grid-2">
        <div>
            <label>E-mail (Field Control):</label>
            <input type="text" id="email" placeholder="Ex: usuario@cobli.co">
        </div>
        <div>
            <label>Senha:</label>
            <input type="password" id="senha" placeholder="Sua senha do Field Control">
        </div>
    </div>
    <div class="aviso-cors">*Nota: Testes diretos no navegador exigem o uso de uma extensão para desativar o CORS (como a "Allow CORS").</div>

    <div class="section-title">Configuração de Segurança</div>
    <label>Chave da API (X-Api-Key):</label>
    <input type="password" id="apiKeyRest" placeholder="Insira a X-Api-Key do sistema de integração">

    <div class="section-title">Processamento em Lote</div>
    <label>Lista de Chamados (Cole uma coluna do Sheets - Um por linha):</label>
    <textarea id="listaChamados" rows="8" placeholder="46389903024&#10;46533835921&#10;46240353125"></textarea>

    <button onclick="executarAutomacaoEmLote()">Iniciar Processamento em Lote</button>

    <label>Log do Sistema:</label>
    <div id="logArea" class="log-area">Aguardando preenchimento dos dados...</div>
</div>

<script>
    // Configurações Fixas Embutidas
    const URL_LOGIN = "https://morannon.fieldcontrol.com.br";
    const URL_REST  = "https://amonamarth.fieldcontrol.com.br";
    const URL_GRAPH = "https://sammathnaur.fieldcontrol.com.br/graphql";
    const FIXED_LABEL_ID = "7e653f62-f380-4924-851a-fc754d8fd470";

    // =====================================================================
    // MEMÓRIA LOCAL: Carrega os dados salvos no navegador assim que a página abre
    // =====================================================================
    window.onload = function() {
        if (localStorage.getItem('field_email')) {
            document.getElementById('email').value = localStorage.getItem('field_email');
        }
        if (localStorage.getItem('field_senha')) {
            document.getElementById('senha').value = localStorage.getItem('field_senha');
        }
        if (localStorage.getItem('field_apikey')) {
            document.getElementById('apiKeyRest').value = localStorage.getItem('field_apikey');
        }
        if (localStorage.getItem('field_email')) {
            document.getElementById('logArea').innerText = "✅ Dados de login recuperados da memória local do seu navegador.";
        }
    };

    function log(message) {
        const logArea = document.getElementById('logArea');
        logArea.innerText += '\n' + message;
        logArea.scrollTop = logArea.scrollHeight; 
        console.log(message);
    }

    async function executarAutomacaoEmLote() {
        document.getElementById('logArea').innerText = "Iniciando Automação em Lote...";
        
        const email = document.getElementById('email').value.trim();
        const senha = document.getElementById('senha').value.trim();
        const apiKeyRest = document.getElementById('apiKeyRest').value.trim();
        const listaChamadosRaw = document.getElementById('listaChamados').value;

        if (!email || !senha || !apiKeyRest || !listaChamadosRaw.trim()) {
            document.getElementById('logArea').innerText = "❌ ERRO: Preencha todos os campos e insira pelo menos um chamado antes de rodar.";
            return;
        }

        // SALVA NA MEMÓRIA DO NAVEGADOR PARA O PRÓXIMO USO
        localStorage.setItem('field_email', email);
        localStorage.setItem('field_senha', senha);
        localStorage.setItem('field_apikey', apiKeyRest);

        const chamados = listaChamadosRaw.split('\n')
            .map(c => c.trim())
            .filter(c => c.length > 0);

        log(`📋 Total de chamados detectados para processamento: ${chamados.length}`);

        let tokenDinamico = null;

        // =====================================================================
        // PASSO 0: FAZER LOGIN APENAS UMA VEZ PARA O LOTE INTEIRO
        // =====================================================================
        try {
            log(`\n[PASSO 0] Realizando login único para gerar o Token...`);
            
            const loginRes = await fetch(`${URL_LOGIN}/auth/sign-in`, {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({ email: email, password: senha })
            });
            
            if (!loginRes.ok) {
                log(`❌ ERRO NO LOGIN (Status ${loginRes.status}). Verifique e-mail/senha ou se o CORS está ativo.`);
                return;
            }

            const loginJson = await loginRes.json();
            tokenDinamico = loginJson.token || loginJson.accessToken || (loginJson.data && loginJson.data.token);
            
            if (!tokenDinamico) {
                log(`❌ ERRO: Login aceito, mas Token não encontrado na resposta.`);
                return;
            }

            log(`✅ Login realizado com sucesso! Token temporário obtido.`);

        } catch (error) {
            log(`\n❌ ERRO FATAL NO LOGIN: ${error.message}`);
            return;
        }

        // =====================================================================
        // REPETIÇÃO (LOOP) - PROCESSA UM CHAMADO POR VEZ
        // =====================================================================
        let sucessos = 0;
        let falhas = 0;

        for (let i = 0; i < chamados.length; i++) {
            const numeroChamado = chamados[i];
            log(`\n--------------------------------------------------`);
            log(`🔄 [${i + 1}/${chamados.length}] Processando chamado: ${numeroChamado}`);

            let maintenanceId = null;

            // PASSO 1: BUSCAR O ID VIA REST
            try {
                const hoje = new Date();
                const trintaDiasAtras = new Date();
                trintaDiasAtras.setDate(hoje.getDate() - 5); 

                const dataInicio = trintaDiasAtras.toISOString().split("T")[0] + "T00:00:00.000Z";
                const dataFim = hoje.toISOString();

                let page = 1;
                let encontrou = false;

                while (page <= 5 && !encontrou) {
                    const buscaUrl = `${URL_REST}/maintenances?page=${page}&perPage=100&openedAtGte=${dataInicio}&openedAtLte=${dataFim}`;
                    
                    const res = await fetch(buscaUrl, {
                        method: 'GET',
                        headers: { 'X-Api-Key': apiKeyRest, 'Accept': 'application/json' }
                    });
                    
                    if (!res.ok) break;

                    const json = await res.json();
                    const items = json.items || [];
                    
                    if (items.length === 0) break;

                    for (let item of items) {
                        const numeroDoItem = String(item.number || "").trim();
                        const identifierDoItem = String(item.identifier || "").trim();
                        
                        if (numeroDoItem.startsWith(numeroChamado) || identifierDoItem.startsWith(numeroChamado)) {
                            maintenanceId = item.id || item.uuid || item.idMaintenance || item.identifier;
                            encontrou = true;
                            break;
                        }
                    }
                    page++;
                }

                if (!maintenanceId) {
                    log(`⚠️ Chamado não encontrado nas páginas recentes. Pulando...`);
                    falhas++;
                    continue; 
                }

                log(`   ↳ ID Interno localizado: ${maintenanceId}`);

            } catch (error) {
                log(`❌ Erro ao buscar chamado ${numeroChamado}: ${error.message}`);
                falhas++;
                continue;
            }

            // PASSO 2: VINCULAR A ETIQUETA VIA GRAPHQL
            try {
                const responseMutacao = await fetch(URL_GRAPH, {
                    method: 'POST',
                    headers: {
                        'Content-Type': 'application/json',
                        'Authorization': `Bearer ${tokenDinamico}`
                    },
                    body: JSON.stringify({
                        query: `
                            mutation createMaintenanceLabels($input: [MaintenanceLabelCreateInput]!) {
                                createMaintenanceLabels(input: $input) { id }
                            }
                        `,
                        variables: {
                            input: [ { labelId: FIXED_LABEL_ID, maintenanceId: maintenanceId } ]
                        }
                    })
                });

                const dataMutacao = await responseMutacao.json();

                if (dataMutacao.errors) {
                    log(`❌ Falha ao vincular etiqueta no chamado ${numeroChamado}:`);
                    log(`   ${JSON.stringify(dataMutacao.errors[0].message)}`);
                    falhas++;
                } else {
                    log(`🎉 Sucesso! Etiqueta vinculada com êxito.`);
                    sucessos++;
                }

            } catch (error) {
                log(`❌ Erro de rede ao vincular etiqueta: ${error.message}`);
                falhas++;
            }
        }

        // RESUMO FINAL DO LOTE
        log(`\n==================================================`);
        log(`🏁 PROCESSAMENTO CONCLUÍDO!`);
        log(`✅ Sucessos: ${sucessos}`);
        log(`❌ Falhas/Ignorados: ${falhas}`);
        log(`==================================================`);
    }
</script>

</body>
</html>
